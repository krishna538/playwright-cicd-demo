name: Playwright CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
  
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v3

      - name: Setup Node.js 
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Playwright tests with server
        run: npx start-server-and-test "npm run start" http://localhost:3000 "npx playwright test"

      
      - name: upload a playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report